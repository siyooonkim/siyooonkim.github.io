  <text x="568" y="516" fill="#CBD5E1" font-size="22" font-family="Arial, sans-serif">1) sent record 저장</text>
  <text x="568" y="548" fill="#CBD5E1" font-size="22" font-family="Arial, sans-serif">2) 이전 after 이상이면 중복 발송 신호로 Slack 알림</text>
  <text x="568" y="580" fill="#CBD5E1" font-size="22" font-family="Arial, sans-serif">3) 다음 후보가 있으면 3일 뒤 delayed job 예약</text>

